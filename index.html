<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Crypto & Gold Price</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141E30, #243B55);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
}

.container {
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    text-align: center;
}

h1 {
    margin-bottom: 30px;
}

table {
    width: 420px;
    border-collapse: collapse;
}

th {
    font-size: 18px;
    padding: 10px;
    border-bottom: 2px solid rgba(255,255,255,0.3);
}

td {
    padding: 15px;
    font-size: 18px;
}

.price-usd {
    font-weight: bold;
    color: #00ffcc;
}

.price-krw {
    font-weight: bold;
    color: #ffd700;
}
</style>
</head>

<body>

<div class="container">
    <h1>💰 자산 실시간 가격</h1>

    <table>
        <tr>
            <th>자산</th>
            <th>USD</th>
            <th>KRW</th>
        </tr>
        <tr>
            <td>Bitcoin</td>
            <td id="btc-usd" class="price-usd">불러오는 중...</td>
            <td id="btc-krw" class="price-krw">불러오는 중...</td>
        </tr>
        <tr>
            <td>Ethereum</td>
            <td id="eth-usd" class="price-usd">불러오는 중...</td>
            <td id="eth-krw" class="price-krw">불러오는 중...</td>
        </tr>
        <tr>
            <td>Gold (1g)</td>
            <td id="gold-usd" class="price-usd">불러오는 중...</td>
            <td id="gold-krw" class="price-krw">불러오는 중...</td>
        </tr>
    </table>
</div>

<script>
function fetchPrice() {

    // 코인 가격
    fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd,krw")
        .then(response => response.json())
        .then(data => {
            document.getElementById("btc-usd").innerText = "$ " + data.bitcoin.usd.toLocaleString();
            document.getElementById("btc-krw").innerText = "₩ " + data.bitcoin.krw.toLocaleString();

            document.getElementById("eth-usd").innerText = "$ " + data.ethereum.usd.toLocaleString();
            document.getElementById("eth-krw").innerText = "₩ " + data.ethereum.krw.toLocaleString();
        });

    // ✅ 금 가격 (goldprice.org 데이터 사용) + 환율로 KRW 계산
// ✅ 금 가격 (대체 소스) + 환율로 KRW 계산
Promise.all([
  fetch("https://data-asg.goldprice.org/dbXRates/USD").then(r => r.json()),
  fetch("https://api.exchangerate-api.com/v4/latest/USD").then(r => r.json())
])
  .then(([goldJson, fxJson]) => {
    const item = goldJson.items?.[0];
    if (!item) throw new Error("gold item missing");

    // goldprice.org 응답에서 금(oz) 가격 추출 (필드가 바뀔 수 있어 후보를 여러 개 둠)
    const goldPerOunceUSD = Number(item.xauPrice ?? item.gold ?? item.price ?? item.ask ?? item.bid);
    if (!Number.isFinite(goldPerOunceUSD) || goldPerOunceUSD <= 0) throw new Error("gold price missing");

    const goldPerGramUSD = goldPerOunceUSD / 31.1035;
    document.getElementById("gold-usd").innerText = "$ " + goldPerGramUSD.toFixed(2);

    const usdToKrw = fxJson.rates?.KRW;
    if (!Number.isFinite(usdToKrw) || usdToKrw <= 0) throw new Error("KRW rate missing");

    const goldPerGramKRW = goldPerGramUSD * usdToKrw;
    document.getElementById("gold-krw").innerText = "₩ " + Math.round(goldPerGramKRW).toLocaleString();
  })
  .catch(err => {
    console.error("Gold fetch failed:", err);
    document.getElementById("gold-usd").innerText = "불러오기 실패";
    document.getElementById("gold-krw").innerText = "불러오기 실패";
  });
}

fetchPrice();
setInterval(fetchPrice, 10000);
</script>

</body>
</html>
