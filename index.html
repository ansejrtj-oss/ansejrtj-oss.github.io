<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Crypto & Gold Price</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141E30, #243B55);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
}

.container {
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    text-align: center;
}

h1 {
    margin-bottom: 30px;
}

table {
    width: 400px;
    border-collapse: collapse;
}

th {
    font-size: 18px;
    padding: 10px;
    border-bottom: 2px solid rgba(255,255,255,0.3);
}

td {
    padding: 15px;
    font-size: 18px;
}

.price-usd {
    font-weight: bold;
    color: #00ffcc;
}

.price-krw {
    font-weight: bold;
    color: #ffd700;
}

</style>
</head>

<body>

<div class="container">
    <h1>💰 오늘의 코인 & 금 가격</h1>

    <table>
        <tr>
            <th>자산</th>
            <th>USD</th>
            <th>KRW</th>
        </tr>

        <tr>
            <td>Bitcoin</td>
            <td id="btc-usd" class="price-usd">불러오는 중...</td>
            <td id="btc-krw" class="price-krw">불러오는 중...</td>
        </tr>

        <tr>
            <td>Ethereum</td>
            <td id="eth-usd" class="price-usd">불러오는 중...</td>
            <td id="eth-krw" class="price-krw">불러오는 중...</td>
        </tr>

        <tr>
            <td>Gold (1oz)</td>
            <td id="gold-usd" class="price-usd">불러오는 중...</td>
            <td id="gold-krw" class="price-krw">불러오는 중...</td>
        </tr>

    </table>
</div>

<script>
function fetchPrice() {
    fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether-gold&vs_currencies=usd,krw")
        .then(response => response.json())
        .then(data => {

            document.getElementById("btc-usd").innerText = "$ " + data.bitcoin.usd.toLocaleString();
            document.getElementById("btc-krw").innerText = "₩ " + data.bitcoin.krw.toLocaleString();

            document.getElementById("eth-usd").innerText = "$ " + data.ethereum.usd.toLocaleString();
            document.getElementById("eth-krw").innerText = "₩ " + data.ethereum.krw.toLocaleString();
            
            const goldPerGramUSD = data["tether-gold"].usd / 31.1035;
            const goldPerGramKRW = data["tether-gold"].krw / 31.1035;

            document.getElementById("gold-usd").innerText = "$ " + goldPerGramUSD.toFixed(2);
            document.getElementById("gold-krw").innerText = "₩ " + goldPerGramKRW.toLocaleString(undefined, {maximumFractionDigits: 0});

        });
}

fetchPrice();
setInterval(fetchPrice, 10000);
</script>

</body>
</html>
