<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blockchain Lab #3</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ethers.js v6 CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">
    <!-- Header -->
    <header class="mb-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-3xl md:text-4xl font-bold tracking-tight">Blockchain Lab #3</h1>
          <p class="text-gray-400 mt-2">MetaMask 연결 및 지갑 정보 확인 대시보드</p>
        </div>

        <div class="flex items-center gap-3">
          <span id="statusDot" class="w-3 h-3 rounded-full bg-gray-500 inline-block"></span>
          <span id="statusText" class="text-sm text-gray-300">미연결</span>
        </div>
      </div>
    </header>

    <!-- Grid -->
    <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Card 1: Wallet Connect -->
      <section class="bg-gray-800 rounded-2xl border border-gray-700 p-6 shadow-lg">
        <div class="flex items-start justify-between mb-5">
          <div>
            <h2 class="text-xl font-semibold">지갑 연결</h2>
            <p class="text-sm text-gray-400 mt-1">MetaMask 지갑을 연결하고 계정 정보를 확인합니다.</p>
          </div>
        </div>

        <div class="space-y-4">
          <button
            id="connectBtn"
            class="w-full md:w-auto px-5 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 transition font-medium"
          >
            MetaMask 연결
          </button>

          <div
            id="metamaskWarning"
            class="hidden rounded-xl border border-red-500/40 bg-red-500/10 text-red-300 px-4 py-3"
          >
            MetaMask가 설치되어 있지 않습니다.
            <a
              href="https://metamask.io/download/"
              target="_blank"
              class="underline font-medium"
            >
              MetaMask 설치하기
            </a>
          </div>

          <div
            id="faucetWarning"
            class="hidden rounded-xl border border-yellow-500/40 bg-yellow-500/10 text-yellow-300 px-4 py-3"
          >
            잔액이 0입니다. Faucet에서 ETH를 받아오세요.
          </div>

          <div class="grid grid-cols-1 gap-4">
            <div class="rounded-2xl bg-gray-900/60 border border-gray-700 p-4">
              <p class="text-sm text-gray-400 mb-1">지갑 주소</p>
              <p id="walletAddress" class="break-all text-sm md:text-base text-gray-100">
                연결되지 않음
              </p>
            </div>

            <div class="rounded-2xl bg-gray-900/60 border border-gray-700 p-4">
              <p class="text-sm text-gray-400 mb-1">ETH 잔액</p>
              <p id="walletBalance" class="text-lg font-semibold">-</p>
            </div>

            <div class="rounded-2xl bg-gray-900/60 border border-gray-700 p-4">
              <p class="text-sm text-gray-400 mb-1">현재 Nonce</p>
              <p id="walletNonce" class="text-lg font-semibold">-</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Card 2: Placeholder -->
      <section class="bg-gray-800 rounded-2xl border border-gray-700 p-6 shadow-lg">
        <h2 class="text-xl font-semibold mb-2">추가 카드</h2>
        <p class="text-gray-400 text-sm">
          여기에 다음 기능(송금 조회, 브리지 조회 등)을 이어서 추가할 수 있습니다.
        </p>

        <div class="mt-5 rounded-2xl bg-gray-900/60 border border-gray-700 p-4">
          <p class="text-sm text-gray-500">
            현재는 기본 구조 + 지갑 연결 기능만 구현되어 있습니다.
          </p>
        </div>
      </section>
    </main>
  </div>

  <script>
    let provider = null;
    let signer = null;
    let currentAddress = null;

    const connectBtn = document.getElementById("connectBtn");
    const metamaskWarning = document.getElementById("metamaskWarning");
    const faucetWarning = document.getElementById("faucetWarning");

    const walletAddressEl = document.getElementById("walletAddress");
    const walletBalanceEl = document.getElementById("walletBalance");
    const walletNonceEl = document.getElementById("walletNonce");

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    function setConnectedUI(isConnected) {
      if (isConnected) {
        statusDot.className = "w-3 h-3 rounded-full bg-green-400 inline-block";
        statusText.textContent = "연결됨";
      } else {
        statusDot.className = "w-3 h-3 rounded-full bg-gray-500 inline-block";
        statusText.textContent = "미연결";
      }
    }

    async function updateWalletInfo(address) {
      try {
        const balance = await provider.getBalance(address);
        const nonce = await provider.getTransactionCount(address);

        const formattedBalance = ethers.formatEther(balance);

        walletAddressEl.textContent = address;
        walletBalanceEl.textContent = `${Number(formattedBalance).toFixed(6)} ETH`;
        walletNonceEl.textContent = nonce;

        if (balance === 0n) {
          faucetWarning.classList.remove("hidden");
        } else {
          faucetWarning.classList.add("hidden");
        }
      } catch (error) {
        console.error("지갑 정보 조회 실패:", error);
        alert("지갑 정보를 불러오는 중 오류가 발생했습니다.");
      }
    }

    async function connectWallet() {
      if (!window.ethereum) {
        metamaskWarning.classList.remove("hidden");
        setConnectedUI(false);
        return;
      }

      metamaskWarning.classList.add("hidden");

      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        await window.ethereum.request({ method: "eth_requestAccounts" });

        signer = await provider.getSigner();
        currentAddress = await signer.getAddress();

        setConnectedUI(true);
        await updateWalletInfo(currentAddress);
      } catch (error) {
        console.error("MetaMask 연결 실패:", error);
        setConnectedUI(false);
        alert("MetaMask 연결에 실패했습니다.");
      }
    }

    async function initIfAlreadyConnected() {
      if (!window.ethereum) {
        metamaskWarning.classList.remove("hidden");
        return;
      }

      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_accounts" });

        if (accounts && accounts.length > 0) {
          signer = await provider.getSigner();
          currentAddress = await signer.getAddress();

          setConnectedUI(true);
          await updateWalletInfo(currentAddress);
        } else {
          setConnectedUI(false);
        }
      } catch (error) {
        console.error("초기 연결 확인 실패:", error);
      }
    }

    if (window.ethereum) {
      window.ethereum.on("accountsChanged", async (accounts) => {
        if (accounts.length === 0) {
          currentAddress = null;
          walletAddressEl.textContent = "연결되지 않음";
          walletBalanceEl.textContent = "-";
          walletNonceEl.textContent = "-";
          faucetWarning.classList.add("hidden");
          setConnectedUI(false);
          return;
        }

        currentAddress = accounts[0];
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        setConnectedUI(true);
        await updateWalletInfo(currentAddress);
      });

      window.ethereum.on("chainChanged", async () => {
        if (currentAddress) {
          provider = new ethers.BrowserProvider(window.ethereum);
          signer = await provider.getSigner();
          await updateWalletInfo(currentAddress);
        }
      });
    }

    connectBtn.addEventListener("click", connectWallet);
    initIfAlreadyConnected();
  </script>
</body>
</html>
